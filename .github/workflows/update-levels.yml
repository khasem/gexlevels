# Plaats dit bestand in je repo als: .github/workflows/update-levels.yml
#
# Draait elke 30 min tijdens US-markturen (ma–vr), berekent de GEX-levels en
# commit de Pine Seeds CSV's + paste_string.txt + historie-snapshots.
#
# Databron: gratis CBOE delayed data — geen API-key of secret nodig.
# Let op: de cron-tijden zijn UTC en afgestemd op US-zomertijd; in de winter
# schuift de US-sessie één uur op (14:30–21:00 UTC).

name: Update GEX levels

on:
  schedule:
    - cron: "*/30 13-21 * * 1-5"   # 15:00-23:00 NL (zomertijd): US-sessie
    - cron: "0 4,5,6,7 * * 1-5"    # 06:00-09:00 NL (zomertijd): ochtend-refresh, nieuwe dag-OI + verse 0DTE
    - cron: "0 8-12 * * 1-5"       # 10:00-14:00 NL (zomertijd): US-premarket, elk uur — verse spot
                                   #   tijdens de EU-ochtendsessie (spot beweegt vanaf 04:00 ET)
  workflow_dispatch: {}        # handmatig triggeren kan ook

permissions:
  contents: write

concurrency:
  group: update-gex-levels
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Compute GEX levels — GLD (goud)
        env:
          UNDERLYING: GLD
          CORRELATED: ""           # geen correlated voor goud (optioneel: GDX)
          FLIP_METHOD: profile
          GAMMA_RANK: total
          SPOT_DELAY_MIN: "15"
        run: python gex_pipeline.py

      # QQQ als laatste: het legacy-bestand paste_string.txt bevat dan QQQ
      - name: Compute GEX levels — QQQ
        env:
          UNDERLYING: QQQ
          CORRELATED: SPY
          FLIP_METHOD: profile     # of: cumulative (oude methode)
          GAMMA_RANK: total        # of: net (oude methode)
          SPOT_DELAY_MIN: "15"     # CBOE delayed-feed correctie voor het TS-anker
        run: python gex_pipeline.py

      - name: Commit & push
        run: |
          git config user.name  "gex-bot"
          git config user.email "gex-bot@users.noreply.github.com"
          git add data/ paste_string.txt history/
          git diff --cached --quiet || git commit -m "GEX levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
